schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

# Profile to workflow mappings (optional)
# Add custom profile names and their workflow combinations here.
# Example:
#   profiles:
#     my-team: [propose, sdt-new, sdt-build]
#     minimal: [propose, apply]

profiles:
  core: [propose, explore, apply, archive]
  sdt: [sdt-new, sdt-build, sdt-design, sdt-clarify]
  custom:
    [
      propose,
      explore,
      new,
      continue,
      apply,
      ff,
      sync,
      archive,
      bulk-archive,
      verify,
      onboard,
      sdt-new,
      sdt-build,
      sdt-design,
      sdt-clarify,
    ]
  my-design: [sdt-new, sdt-design, sdt-clarify]
